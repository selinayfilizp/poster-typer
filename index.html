<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PosterTyper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@400;500;700;900&family=Space+Mono:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Mono', monospace;
    background: #0c0c0c;
    color: #999;
    height: 100vh;
    overflow: hidden;
  }

  .app {
    display: grid;
    grid-template-columns: 380px 1fr;
    height: 100vh;
  }

  /* ── Left Panel ── */
  .controls {
    padding: 36px 32px;
    border-right: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    gap: 28px;
    overflow-y: auto;
    background: #0c0c0c;
  }

  .controls::-webkit-scrollbar { width: 0; }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .logo {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
  }

  .sys-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #444;
  }

  label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #555;
    display: block;
    margin-bottom: 12px;
  }

  textarea {
    width: 100%;
    min-height: 100px;
    padding: 16px 18px;
    background: #141414;
    border: 1px solid #222;
    border-radius: 4px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: #fff; }
  textarea::placeholder { color: #333; }

  /* Button groups */
  .btn-row {
    display: flex;
    gap: 0;
  }

  .btn-option {
    flex: 1;
    padding: 12px 0;
    background: transparent;
    border: 1px solid #222;
    color: #555;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .btn-option:first-child { border-radius: 4px 0 0 4px; }
  .btn-option:last-child { border-radius: 0 4px 4px 0; }
  .btn-option:not(:first-child) { border-left: none; }

  .btn-option:hover { color: #aaa; background: #161616; }

  .btn-option.active {
    background: #fff;
    border-color: #fff;
    color: #0c0c0c;
  }

  /* Alignment buttons */
  .align-row {
    display: flex;
    gap: 0;
  }

  .align-option {
    width: 48px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid #222;
    cursor: pointer;
    color: #555;
    transition: all 0.15s;
  }

  .align-option:first-child { border-radius: 4px 0 0 4px; }
  .align-option:last-child { border-radius: 0 4px 4px 0; }
  .align-option:not(:first-child) { border-left: none; }

  .align-option:hover { color: #aaa; }
  .align-option.active { background: #fff; border-color: #fff; color: #0c0c0c; }
  .align-option svg { width: 14px; height: 14px; }

  /* Color row */
  .color-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .color-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
  }

  .color-dot:hover { transform: scale(1.15); }
  .color-dot.active { border-color: #fff; box-shadow: 0 0 0 2px #0c0c0c, 0 0 0 4px #fff; }

  .color-custom-wrap {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px dashed #333;
    position: relative;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .color-custom-wrap span { font-size: 12px; color: #444; pointer-events: none; }
  .color-custom-wrap input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

  /* Stats */
  .stats-row {
    display: flex;
    gap: 24px;
    padding: 16px 0;
    border-top: 1px solid #1a1a1a;
    border-bottom: 1px solid #1a1a1a;
  }

  .stat-item { display: flex; flex-direction: column; gap: 4px; }

  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .stat-lbl {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #444;
  }

  /* Export */
  .export-section {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-top: 1px solid #1a1a1a;
    cursor: pointer;
    transition: color 0.15s;
  }

  .export-section:hover { color: #fff; }
  .export-section:hover .arrow-icon { color: #fff; }

  .export-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #999;
  }

  .arrow-icon {
    color: #444;
    font-size: 16px;
    transition: color 0.15s;
  }

  .credit {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: #333;
    letter-spacing: 0.08em;
  }

  .credit a { color: #444; text-decoration: none; }
  .credit a:hover { color: #888; }

  /* ── Right Panel: Preview ── */
  .preview-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
    background: #111;
    position: relative;
    overflow: hidden;
  }

  .page-wrap {
    position: relative;
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6));
  }

  .page {
    background: #fff;
    position: relative;
    overflow: hidden;
    transition: width 0.3s ease, height 0.3s ease;
  }

  /* Poster decorations */
  .poster-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 2;
    pointer-events: none;
  }

  .poster-tag {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #999;
  }

  .poster-circle {
    position: absolute;
    top: 50%;
    left: 55%;
    transform: translate(-50%, -50%);
    width: 45%;
    aspect-ratio: 1;
    border-radius: 50%;
    border: 0.5px solid rgba(0,0,0,0.08);
    pointer-events: none;
    z-index: 1;
  }

  .poster-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 2;
    pointer-events: none;
  }

  .poster-credits {
    font-family: 'DM Mono', monospace;
    font-size: 6px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #aaa;
    line-height: 1.8;
  }

  .poster-credits-right {
    font-family: 'DM Mono', monospace;
    font-size: 6px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #aaa;
    line-height: 1.8;
    text-align: right;
  }

  .page-text {
    color: #0a0a0a;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 8% 6%;
    word-break: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
    position: relative;
    z-index: 3;
  }

  .page-text.align-left { justify-content: flex-start; text-align: left; }
  .page-text.align-center { justify-content: center; text-align: center; }
  .page-text.align-right { justify-content: flex-end; text-align: right; }

  .empty-state {
    color: #ccc;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 400;
    text-align: center;
    line-height: 1.6;
    opacity: 0.4;
  }

  .fit-badge {
    position: absolute;
    bottom: -32px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #444;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .fit-badge .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #22c55e;
  }

  /* Loading */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: #0c0c0c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .loading-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #444;
    letter-spacing: 0.1em;
    margin-top: 16px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid #222;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 800px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .controls { border-right: none; border-bottom: 1px solid #1a1a1a; max-height: 45vh; }
    .preview-area { padding: 24px; }
    .poster-top, .poster-bottom { display: none; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Initializing engine...</div>
</div>

<div class="app">
  <div class="controls">
    <div class="header">
      <div class="logo">POSTERTYPER</div>
      <div class="sys-label">SYS.01 // ENGINE</div>
    </div>

    <div>
      <label>Source Message</label>
      <textarea id="textInput" placeholder="Beautiful Destinations" spellcheck="false"></textarea>
    </div>

    <div>
      <label>Typeface</label>
      <div class="btn-row" id="fontGroup">
        <button class="btn-option active" data-font="'Syne', sans-serif" data-weight="800">Sans</button>
        <button class="btn-option" data-font="'Playfair Display', serif" data-weight="900">Serif</button>
        <button class="btn-option" data-font="'Space Mono', monospace" data-weight="700">Mono</button>
      </div>
    </div>

    <div>
      <label>Style Variant</label>
      <div class="btn-row" id="variantGroup">
        <button class="btn-option active" data-font="'Syne', sans-serif" data-weight="800" data-style="normal">Bold</button>
        <button class="btn-option" data-font="'Instrument Serif', serif" data-weight="400" data-style="italic">Italic</button>
        <button class="btn-option" data-font="'Bebas Neue', sans-serif" data-weight="400" data-style="normal">Tall</button>
        <button class="btn-option" data-font="'Libre Baskerville', serif" data-weight="400" data-style="normal">Classic</button>
      </div>
    </div>

    <div>
      <label>Alignment</label>
      <div class="align-row" id="alignGroup">
        <button class="align-option active" data-align="left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 10H3M21 6H3M21 14H3M17 18H3"/></svg>
        </button>
        <button class="align-option" data-align="center">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10H6M21 6H3M21 14H3M18 18H6"/></svg>
        </button>
        <button class="align-option" data-align="right">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H7M21 6H3M21 14H3M21 18H7"/></svg>
        </button>
      </div>
    </div>

    <div>
      <label>Ink Color</label>
      <div class="color-row" id="colorGroup">
        <div class="color-dot active" data-color="#0a0a0a" style="background:#0a0a0a; border: 1px solid #333;"></div>
        <div class="color-dot" data-color="#1a1a6e" style="background:#1a1a6e"></div>
        <div class="color-dot" data-color="#8b1a1a" style="background:#8b1a1a"></div>
        <div class="color-dot" data-color="#1a4a2a" style="background:#1a4a2a"></div>
        <div class="color-dot" data-color="#5a3e28" style="background:#5a3e28"></div>
        <div class="color-custom-wrap">
          <span>+</span>
          <input type="color" id="customColor" value="#0a0a0a">
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-num" id="fontSizeStat">&mdash;</div>
        <div class="stat-lbl">Font Size</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="linesStat">&mdash;</div>
        <div class="stat-lbl">Lines</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="fillStat">&mdash;</div>
        <div class="stat-lbl">Fill %</div>
      </div>
    </div>

    <div>
      <label>Paper</label>
      <div class="btn-row" id="sizeGroup">
        <button class="btn-option active" data-w="210" data-h="297">A4</button>
        <button class="btn-option" data-w="216" data-h="279">Letter</button>
        <button class="btn-option" data-w="297" data-h="420">A3</button>
        <button class="btn-option" data-w="297" data-h="210">Wide</button>
      </div>
    </div>

    <div class="export-section" id="exportBtn">
      <span class="export-label">Print Sequence</span>
      <span class="arrow-icon">&nearr;</span>
    </div>

    <div class="credit">
      Powered by <a href="https://github.com/chenglou/pretext" target="_blank">Pretext</a> &mdash; DOM-free text engine
    </div>
  </div>

  <div class="preview-area">
    <div class="page-wrap">
      <div class="page" id="page">
        <div class="poster-top">
          <span class="poster-tag">Explore</span>
          <span class="poster-tag" id="yearTag">2026</span>
        </div>
        <div class="poster-circle"></div>
        <div class="page-text align-left" id="pageText">
          <span class="empty-state">Type a message<br>to begin</span>
        </div>
        <div class="poster-bottom">
          <div class="poster-credits">
            Design&emsp;&emsp;Studio<br>
            Typography&emsp;&emsp;Dynamic<br>
            System&emsp;&emsp;PosterTyper v1
          </div>
          <div class="poster-credits-right" id="creditsRight">
            Credits<br>
            &mdash;
          </div>
        </div>
      </div>
      <div class="fit-badge">
        <span class="dot"></span>
        <span id="fitLabel">Fits on 1 page</span>
      </div>
    </div>
  </div>
</div>

<script>
const { prepare, layout, clearCache } = Pretext;

let state = {
  text: '',
  fontFamily: "'Syne', sans-serif",
  fontWeight: '800',
  fontStyle: 'normal',
  paperW: 210,
  paperH: 297,
  textColor: '#0a0a0a',
  align: 'left',
  currentFontSize: 0,
  currentLines: 0,
  activeGroup: 'font', // track which group set the font
}

const textInput = document.getElementById('textInput')
const page = document.getElementById('page')
const pageText = document.getElementById('pageText')
const fontSizeStat = document.getElementById('fontSizeStat')
const linesStat = document.getElementById('linesStat')
const fillStat = document.getElementById('fillStat')
const loading = document.getElementById('loading')

const MM_TO_PX = 3.7795275591
const PADDING_RATIO = 0.07

function getPageDimensions() {
  return { w: state.paperW * MM_TO_PX, h: state.paperH * MM_TO_PX }
}

function getScaledPageSize() {
  const { w, h } = getPageDimensions()
  const area = document.querySelector('.preview-area')
  const maxW = area.clientWidth - 96
  const maxH = area.clientHeight - 96
  const scale = Math.min(maxW / w, maxH / h, 1)
  return { width: w * scale, height: h * scale, scale }
}

function buildFontString(size) {
  let s = ''
  if (state.fontStyle === 'italic') s += 'italic '
  s += state.fontWeight + ' '
  s += size + 'px '
  s += state.fontFamily
  return s
}

function findMaxFontSize(text, containerW, containerH) {
  const px = containerW * PADDING_RATIO
  const py = containerH * PADDING_RATIO
  const availW = containerW - (px * 2)
  const availH = containerH - (py * 2)

  const words = text.trim().split(/\s+/)

  let lo = 8, hi = 800, bestSize = lo, bestLines = 1

  for (let i = 0; i < 30; i++) {
    const mid = Math.floor((lo + hi) / 2)
    if (mid <= lo) break

    const lineHeight = mid * 1.1
    const font = buildFontString(mid)

    try {
      // Check that every individual word fits on one line at this font size.
      // This prevents Pretext from breaking words mid-character.
      let anyWordBroken = false
      for (let w = 0; w < words.length; w++) {
        const wp = prepare(words[w], font)
        const wr = layout(wp, availW, lineHeight)
        if (wr.lineCount > 1) {
          anyWordBroken = true
          break
        }
      }

      if (anyWordBroken) {
        hi = mid
        continue
      }

      const prepared = prepare(text, font)
      const result = layout(prepared, availW, lineHeight)

      if (result.height <= availH) {
        bestSize = mid
        bestLines = result.lineCount
        lo = mid
      } else {
        hi = mid
      }
    } catch (e) {
      hi = mid
    }
  }

  return { fontSize: bestSize, lineCount: bestLines }
}

function render() {
  const { width, height, scale } = getScaledPageSize()
  page.style.width = width + 'px'
  page.style.height = height + 'px'

  // Scale poster decorations
  const decorScale = Math.min(scale, 0.8)
  document.querySelectorAll('.poster-tag').forEach(el => {
    el.style.fontSize = Math.max(7, 9 * decorScale) + 'px'
  })
  document.querySelectorAll('.poster-credits, .poster-credits-right').forEach(el => {
    el.style.fontSize = Math.max(5, 7 * decorScale) + 'px'
  })

  if (!state.text.trim()) {
    pageText.innerHTML = '<span class="empty-state">Type a message<br>to begin</span>'
    pageText.style.fontSize = ''
    pageText.style.fontFamily = ''
    pageText.style.fontWeight = ''
    pageText.style.fontStyle = ''
    pageText.style.lineHeight = ''
    pageText.style.color = ''
    fontSizeStat.textContent = '\u2014'
    linesStat.textContent = '\u2014'
    fillStat.textContent = '\u2014'
    return
  }

  const { w: realW, h: realH } = getPageDimensions()
  const { fontSize, lineCount } = findMaxFontSize(state.text, realW, realH)

  const scaledFontSize = fontSize * scale
  const scaledLineHeight = fontSize * 1.1 * scale

  state.currentFontSize = fontSize
  state.currentLines = lineCount

  pageText.textContent = state.text
  pageText.style.fontSize = scaledFontSize + 'px'
  pageText.style.fontFamily = state.fontFamily
  pageText.style.fontWeight = state.fontWeight
  pageText.style.fontStyle = state.fontStyle
  pageText.style.lineHeight = scaledLineHeight + 'px'
  pageText.style.color = state.textColor
  pageText.className = 'page-text align-' + state.align

  fontSizeStat.textContent = fontSize + 'px'
  linesStat.textContent = lineCount
  const rLH = fontSize * 1.1
  const py = realH * PADDING_RATIO
  const availH = realH - (py * 2)
  const fill = Math.min(100, Math.round((lineCount * rLH / availH) * 100))
  fillStat.textContent = fill + '%'
}

let renderTimeout
function debouncedRender() {
  clearTimeout(renderTimeout)
  renderTimeout = setTimeout(render, 16)
}

// Ensure Google Fonts are loaded before measuring
async function fontSafeRender() {
  try {
    await document.fonts.ready
  } catch(e) {}
  render()
}

textInput.addEventListener('input', () => {
  state.text = textInput.value
  debouncedRender()
})

// Font group (Sans / Serif / Mono)
document.getElementById('fontGroup').addEventListener('click', (e) => {
  const btn = e.target.closest('.btn-option')
  if (!btn) return
  document.querySelectorAll('#fontGroup .btn-option').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  // Deactivate variant group
  document.querySelectorAll('#variantGroup .btn-option').forEach(b => b.classList.remove('active'))
  state.fontFamily = btn.dataset.font
  state.fontWeight = btn.dataset.weight
  state.fontStyle = btn.dataset.style || 'normal'
  state.activeGroup = 'font'
  clearCache()
  fontSafeRender()
})

// Variant group (Bold / Italic / Tall / Classic)
document.getElementById('variantGroup').addEventListener('click', (e) => {
  const btn = e.target.closest('.btn-option')
  if (!btn) return
  document.querySelectorAll('#variantGroup .btn-option').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  // Deactivate font group
  document.querySelectorAll('#fontGroup .btn-option').forEach(b => b.classList.remove('active'))
  state.fontFamily = btn.dataset.font
  state.fontWeight = btn.dataset.weight
  state.fontStyle = btn.dataset.style || 'normal'
  state.activeGroup = 'variant'
  clearCache()
  fontSafeRender()
})

document.getElementById('sizeGroup').addEventListener('click', (e) => {
  const btn = e.target.closest('.btn-option')
  if (!btn) return
  document.querySelectorAll('#sizeGroup .btn-option').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  state.paperW = parseInt(btn.dataset.w)
  state.paperH = parseInt(btn.dataset.h)
  debouncedRender()
})

document.getElementById('colorGroup').addEventListener('click', (e) => {
  const dot = e.target.closest('.color-dot')
  if (!dot) return
  document.querySelectorAll('#colorGroup .color-dot').forEach(d => d.classList.remove('active'))
  dot.classList.add('active')
  state.textColor = dot.dataset.color
  debouncedRender()
})

document.getElementById('customColor').addEventListener('input', (e) => {
  document.querySelectorAll('#colorGroup .color-dot').forEach(d => d.classList.remove('active'))
  state.textColor = e.target.value
  debouncedRender()
})

document.getElementById('alignGroup').addEventListener('click', (e) => {
  const btn = e.target.closest('.align-option')
  if (!btn) return
  document.querySelectorAll('#alignGroup .align-option').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  state.align = btn.dataset.align
  debouncedRender()
})

document.getElementById('exportBtn').addEventListener('click', () => {
  if (!state.text.trim()) return
  const fontSize = state.currentFontSize
  const lineHeight = fontSize * 1.1
  const isLandscape = state.paperW > state.paperH

  const pw = window.open('', '_blank')
  pw.document.write('<!DOCTYPE html><html><head>' +
    '<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;700&family=Syne:wght@400;800&family=Bebas+Neue&family=Playfair+Display:ital,wght@0,900;1,700&family=Inter:wght@900&family=Space+Mono:wght@700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">' +
    '<style>' +
    '@page { size: ' + (isLandscape ? state.paperH + 'mm ' + state.paperW + 'mm landscape' : state.paperW + 'mm ' + state.paperH + 'mm') + '; margin: 0; }' +
    '* { margin: 0; padding: 0; box-sizing: border-box; }' +
    'body { width: ' + state.paperW + 'mm; height: ' + state.paperH + 'mm; display: flex; align-items: center; padding: 7%; }' +
    '.text { width: 100%; font-family: ' + state.fontFamily + '; font-weight: ' + state.fontWeight + '; font-style: ' + state.fontStyle + '; font-size: ' + fontSize + 'px; line-height: ' + lineHeight + 'px; color: ' + state.textColor + '; text-align: ' + state.align + '; word-break: break-word; overflow-wrap: break-word; white-space: pre-wrap; }' +
    '</style></head><body>' +
    '<div class="text">' + state.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>' +
    '</body></html>')
  pw.document.close()
  setTimeout(() => { pw.print() }, 600)
})

window.addEventListener('resize', debouncedRender)

// Init
loading.classList.add('hidden')
setTimeout(() => loading.remove(), 500)

// Wait for fonts then render
fontSafeRender()
</script>

</body>
</html>
